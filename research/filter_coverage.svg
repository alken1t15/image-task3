<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#ffffff"/>
  <text x="600" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700">Дополнительные фильтры: baseline и параллельный сценарий</text>
  <text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#555">6 дополнительных фильтров, 12 повторов на сценарий</text>
  <line x1="90" y1="430" x2="1140" y2="430" stroke="#222"/>
  <line x1="90" y1="80" x2="90" y2="430" stroke="#222"/>
  <g font-family="Arial, sans-serif" font-size="12" fill="#555">
    <line x1="84" y1="430" x2="1140" y2="430" stroke="#ddd"/><text x="76" y="434" text-anchor="end">0</text>
    <line x1="84" y1="326" x2="1140" y2="326" stroke="#ddd"/><text x="76" y="330" text-anchor="end">500</text>
    <line x1="84" y1="222" x2="1140" y2="222" stroke="#ddd"/><text x="76" y="226" text-anchor="end">1000</text>
    <line x1="84" y1="118" x2="1140" y2="118" stroke="#ddd"/><text x="76" y="122" text-anchor="end">1500</text>
    <text x="28" y="255" transform="rotate(-90 28 255)" text-anchor="middle">миллисекунды</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="11">
    <rect x="130" y="229" width="28" height="201" fill="#4e79a7"/><rect x="162" y="300" width="28" height="130" fill="#59a14f"/><text x="160" y="452" text-anchor="middle">blur3</text>
    <rect x="295" y="82" width="28" height="348" fill="#4e79a7"/><rect x="327" y="255" width="28" height="175" fill="#59a14f"/><text x="325" y="452" text-anchor="middle">blur5</text>
    <rect x="460" y="225" width="28" height="205" fill="#4e79a7"/><rect x="492" y="279" width="28" height="151" fill="#59a14f"/><text x="490" y="452" text-anchor="middle">sharpen3</text>
    <rect x="625" y="224" width="28" height="206" fill="#4e79a7"/><rect x="657" y="292" width="28" height="138" fill="#59a14f"/><text x="655" y="452" text-anchor="middle">emboss3</text>
    <rect x="790" y="224" width="28" height="206" fill="#4e79a7"/><rect x="822" y="296" width="28" height="134" fill="#59a14f"/><text x="820" y="452" text-anchor="middle">mean3</text>
    <rect x="955" y="146" width="28" height="284" fill="#4e79a7"/><rect x="987" y="283" width="28" height="147" fill="#59a14f"/><text x="985" y="452" text-anchor="middle">median3</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="13">
    <rect x="420" y="505" width="16" height="16" fill="#4e79a7"/><text x="443" y="518">последовательно, 1 рабочий</text>
    <rect x="650" y="505" width="16" height="16" fill="#59a14f"/><text x="673" y="518">параллельно, 1 рабочий x 8 потоков</text>
  </g>
