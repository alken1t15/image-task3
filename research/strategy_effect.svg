<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <rect width="1000" height="500" fill="#ffffff"/>
  <text x="500" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700">Сравнение способов разбиения изображения</text>
  <text x="500" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#555">Фильтр gaussian5, 2 рабочих x 4 внутренних потока, 12 повторов</text>
  <line x1="90" y1="380" x2="940" y2="380" stroke="#222"/>
  <line x1="90" y1="80" x2="90" y2="380" stroke="#222"/>
  <g font-family="Arial, sans-serif" font-size="12" fill="#555">
    <line x1="84" y1="380" x2="940" y2="380" stroke="#ddd"/><text x="76" y="384" text-anchor="end">0</text>
    <line x1="84" y1="305" x2="940" y2="305" stroke="#ddd"/><text x="76" y="309" text-anchor="end">250</text>
    <line x1="84" y1="230" x2="940" y2="230" stroke="#ddd"/><text x="76" y="234" text-anchor="end">500</text>
    <line x1="84" y1="155" x2="940" y2="155" stroke="#ddd"/><text x="76" y="159" text-anchor="end">750</text>
    <line x1="84" y1="80" x2="940" y2="80" stroke="#ddd"/><text x="76" y="84" text-anchor="end">1000</text>
    <text x="28" y="230" transform="rotate(-90 28 230)" text-anchor="middle">миллисекунды</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="13">
    <rect x="150" y="87" width="90" height="293" fill="#f28e2b"/><text x="195" y="79" text-anchor="middle">977</text><text x="195" y="405" text-anchor="middle">pixels</text>
    <rect x="340" y="102" width="90" height="278" fill="#f28e2b"/><text x="385" y="94" text-anchor="middle">927</text><text x="385" y="405" text-anchor="middle">rows</text>
    <rect x="530" y="107" width="90" height="273" fill="#f28e2b"/><text x="575" y="99" text-anchor="middle">909</text><text x="575" y="405" text-anchor="middle">columns</text>
    <rect x="720" y="107" width="90" height="273" fill="#f28e2b"/><text x="765" y="99" text-anchor="middle">911</text><text x="765" y="405" text-anchor="middle">grid</text>
  </g>
  <text x="500" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555">На этом наборе columns и grid оказались почти равными, pixels проиграл из-за атомарного счётчика.</text>
</svg>
